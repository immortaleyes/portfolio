# netlify.toml — Deployment configuration for ajaykushwaha.in

[build]
  publish = "."
  functions = "netlify/functions"

# Redirect API calls to serverless functions
[[redirects]]
  from  = "/api/send-contact"
  to    = "/.netlify/functions/send-contact"
  status = 200

[[redirects]]
  from  = "/api/send-lor"
  to    = "/.netlify/functions/send-lor"
  status = 200

# Security headers — protect the site
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-XSS-Protection          = "1; mode=block"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy   = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' https://api.emailjs.com https://cdn.jsdelivr.net; img-src 'self' data: https:; frame-ancestors 'none';"

[functions]
  node_bundler = "esbuild"
